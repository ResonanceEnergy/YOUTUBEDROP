services:
  openclaw:
    build: .
    container_name: youtubedrop-openclaw
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./downloads:/app/downloads
      - ./data:/app/data
      - ./ncl_out:/app/ncl_out
      - youtubedrop-db:/app/db
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - DATA_ROOT=/app/data
      - NCL_ROOT=/app/ncl_out
      - DATABASE_URL=sqlite:///./db/youtubedrop.db

  pipeline:
    build: .
    container_name: youtubedrop-pipeline
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./ncl_out:/app/ncl_out
    environment:
      - DATA_ROOT=/app/data
      - NCL_ROOT=/app/ncl_out
    command: ["python", "run_daily.py", "--mode", "all"]
    profiles:
      - pipeline

volumes:
  youtubedrop-db:
